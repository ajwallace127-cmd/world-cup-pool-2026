name: Update Standings

on:
  schedule:
    # Every 2 hours during the tournament (June 12 – July 19, 2026)
    - cron: '0 */2 * * *'
  workflow_dispatch:   # Manual trigger from the Actions tab

permissions:
  contents: write

jobs:
  update:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Generate standings
        run: python process_pool.py pool_entries.xlsx

      - name: Commit updated index.html
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add index.html
          git diff --staged --quiet || git commit -m "Auto-update standings [$(date -u '+%Y-%m-%d %H:%M UTC')]"
          git push
